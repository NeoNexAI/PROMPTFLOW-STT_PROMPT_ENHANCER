name: Bug Report
description: Report a problem with PromptFlow STT
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Press the enhance hotkey
        2. Select mode ...
        3. ...
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: e.g. 0.1.0
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Provider / mode / logs
      description: Which AI provider and mode? Include any error banner text. Do NOT paste API keys.
