name: CI

on:
  push:
    branches: [main, "bootstrap/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (lint + type-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run type-check
      - run: npm test

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install system deps (Tauri Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libasound2-dev
      - name: cargo fmt check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: cargo clippy
        # --all-targets lints test code too. dead_code + unused_imports allowed:
        # scaffold modules for future sprints (audio, stt, cost, permissions,
        # telemetry, updater stubs are intentionally empty).
        # Remove these allows as each module is implemented.
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings -A dead_code -A unused_imports
      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml
